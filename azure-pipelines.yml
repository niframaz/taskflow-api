trigger:
- develop   # Trigger on the dev branch

pool:
  name: Default

variables:
  dockerRegistryServiceConnection: 'MyTaskFlowAcr'  # Your ACR service connection
  imageName: 'taskflowapi'                          # Docker image name
  buildConfiguration: 'Debug'

parameters:
  - name: environment
    type: string
    default: 'development'
  - name: dockerTag
    type: string
    default: 'dev'
  - name: appName
    type: string
    default: 'TaskFlowApi-Dev'                     # Free-tier App Service name

stages:

# ---------------- Stage 1: Build & Push Docker Image ----------------
- stage: Build
  displayName: Build Docker Image
  jobs:
  - job: BuildDocker
    displayName: Build Docker
    steps:

    # Install .NET SDK
    - task: UseDotNet@2
      displayName: 'Install .NET SDK'
      inputs:
        packageType: 'sdk'
        version: '10.x'

    # Build and Push Docker Image to MyTaskFlowAcr
    - task: Docker@2
      displayName: 'Build & Push Docker Image'
      inputs:
        containerRegistry: $(dockerRegistryServiceConnection)
        repository: $(imageName)
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        tags: |
          ${{ parameters.dockerTag }}

# ---------------- Stage 2: Deploy to Free App Service ----------------
- stage: Deploy
  displayName: Deploy Docker Container
  dependsOn: Build
  jobs:
  - deployment: DeployDockerDev
    displayName: 'Deploy Docker Container'
    environment: ${{ parameters.environment }}
    strategy:
      runOnce:
        deploy:
          steps:

          # Deploy container to App Service (Free Tier)
          - task: AzureWebAppContainer@1
            displayName: 'Deploy to Azure App Service (Dev)'
            inputs:
              azureSubscription: 'AzureServiceConnection-Dev'
              appName: '${{ parameters.appName }}'
              containers: |
                MyTaskFlowAcr.azurecr.io/$(imageName):${{ parameters.dockerTag }}